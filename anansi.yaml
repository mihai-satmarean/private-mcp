name: Anansi Infrastructure MCP
shortDescription: Manage CANDR.ME VFX infrastructure via AWX and AWS
description: |
  Domain-level MCP server for CANDR.ME VFX infrastructure operations.
  Manages workstations, queries AWS costs, and provisions client accounts
  through AWX Job Template 30 (infrastructure.yml).

  ## Features
  - **Workstation Management**: List, start, stop, provision, and deprovision GPU workstations
  - **AWS Cost Visibility**: Query per-client spend from AWS Cost Explorer with service breakdown
  - **Account Provisioning**: Create new AWS Organizations member accounts for clients
  - **Full Audit Trail**: All write operations go through AWX — logged, versioned, reviewable

  ## What you'll need to connect

  **Required:**
  - **AWX Token**: Personal Access Token for the `obot-anansi-mcp-agent` AWX service account
  - **AWX Base URL**: Your AWX Tower base URL (e.g. `https://awx.candr.me`)

  **Optional (for cost and account tools):**
  - **AWS credentials**: Access key / secret with `ce:GetCostAndUsage`, `organizations:*` on the management account

toolPreview:
  - name: list_workstations
    description: List all workstations in AWX, optionally filtered by inventory (client environment)
    params:
      inventory: Inventory name to filter by, e.g. "ingram-prod" (optional)
  - name: list_inventories
    description: List all AWX inventories with host counts — use to discover client environment names
    params: {}
  - name: start_workstation
    description: Start (power on) a workstation by its AWX host name
    params:
      host_name: Exact AWX host name — get from list_workstations (required)
  - name: stop_workstation
    description: Stop (power off) a workstation — instance is stopped, data preserved
    params:
      host_name: Exact AWX host name (required)
  - name: provision_workstation
    description: Provision a new GPU workstation on AWS EC2 for a client
    params:
      client: Client short-name e.g. "ingram", "skylite" (required)
      station_type: "linux" (role-beeble) or "windows" (role-nice_dcv), default linux (optional)
      instance_type: AWS instance type e.g. g4dn.xlarge, g5.xlarge, default g4dn.xlarge (optional)
  - name: deprovision_workstation
    description: Permanently terminate a workstation. Use confirm=false first for dry-run preview
    params:
      host_name: Exact AWX host name (required)
      confirm: Must be true to proceed; false returns a dry-run preview (optional)
  - name: get_costs
    description: Get AWS cost breakdown per service for one or all client accounts, with history
    params:
      account_id: 12-digit AWS account ID — omit for all clients (optional)
      granularity: MONTHLY or DAILY, default MONTHLY (optional)
      months_back: Months of history, default 3 (optional)
  - name: list_client_accounts
    description: List all AWS accounts in the client OU with IDs and status
    params: {}
  - name: create_client_account
    description: Create a new AWS Organizations member account for a client (takes 1-3 minutes)
    params:
      client_name: Human-readable account name e.g. "Acme Production" (required)
      email: Unique root email for the new account (required)

metadata:
  categories: Infrastructure, VFX, DevOps, AWS, Ansible
  icon: https://raw.githubusercontent.com/mihai-satmarean/private-mcp/main/icons/anansi.png
  repoURL: https://github.com/mihai-satmarean/anansi-mcp-server

env:
  - key: AWX_BASE_URL
    name: AWX Base URL
    required: true
    sensitive: false
    description: "AWX Tower base URL, e.g. https://awx.candr.me"
  - key: AWX_TOKEN
    name: AWX Token
    required: true
    sensitive: true
    description: "Personal Access Token for the obot-anansi-mcp-agent AWX service account"
  - key: AWX_JT_INFRASTRUCTURE
    name: Infrastructure Job Template ID
    required: false
    sensitive: false
    description: "AWX Job Template ID for infrastructure.yml. Default: 30"
  - key: AWS_REGION
    name: AWS Region
    required: false
    sensitive: false
    description: "AWS region for Cost Explorer queries. Default: eu-west-1"
  - key: AWS_ACCESS_KEY_ID
    name: AWS Access Key ID
    required: false
    sensitive: true
    description: "AWS access key for management account (needed for get_costs, list_client_accounts, create_client_account)"
  - key: AWS_SECRET_ACCESS_KEY
    name: AWS Secret Access Key
    required: false
    sensitive: true
    description: "AWS secret key for management account"
  - key: AWS_ORGANIZATIONS_OU_CLIENTS
    name: Client OU ID
    required: false
    sensitive: false
    description: "AWS Organizations OU ID where client accounts live, e.g. ou-xxxx-xxxxxxxx"

runtime: containerized
containerizedConfig:
  image: "ghcr.io/mihai-satmarean/anansi-mcp-server:latest"
  port: 8088
  path: /sse
